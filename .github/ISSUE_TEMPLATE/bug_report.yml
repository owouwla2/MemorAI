name: Bug Report
description: 报告一个问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢报告 bug！请尽量提供详细信息。

  - type: input
    id: version
    attributes:
      label: MemorAI 版本
      description: 在程序底部 footer 显示
      placeholder: "v0.4"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows 11
        - Windows 10
        - 其他
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: 发生了什么？
      description: 描述你看到的现象
      placeholder: "我点击 XX 按钮后..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开程序
        2. 点击...
        3. 然后看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望的行为
      placeholder: 我期望 XX 应该...

  - type: textarea
    id: screenshots
    attributes:
      label: 截图（如有）
      description: 直接粘贴图片到这里
