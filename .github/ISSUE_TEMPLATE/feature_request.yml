name: Feature Request
description: 提一个新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: 你想要什么？
      description: 简单描述你想要的功能
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: 为什么需要这个？
      description: 这个功能能解决什么问题？或者带来什么价值？

  - type: textarea
    id: alternative
    attributes:
      label: 你考虑过哪些替代方案？
      description: 如果有的话
