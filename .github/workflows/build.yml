name: Build Check

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Compile (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Go vet
        run: go vet ./...

      - name: Go build (all packages including CLI)
        run: go build ./...

      - name: Build memorai-cli
        run: go build -trimpath -ldflags "-s -w" -o build/bin/memorai-cli.exe ./cmd/memorai-cli

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Wails build (no installer)
        run: wails build -clean -nopackage
